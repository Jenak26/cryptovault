name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    name: Backend — build, unit + integration tests
    runs-on: ubuntu-latest

    services:
      # Matches backend/src/main/resources/application.yml (root / devpassword / cryptovault).
      # The @SpringBootTest context test (CryptovaultApplicationTests) connects here; the
      # Testcontainers integration tests (*IT) spin up their own throwaway MySQL separately.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: devpassword
          MYSQL_DATABASE: cryptovault
        ports:
          - 3306:3306
        # Auth-aware health check: only reports healthy once the real server (with the root
        # password applied) is accepting connections — avoids the init-phase race.
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pdevpassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build, test, and run Testcontainers integration tests
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean verify

  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type-check and build
        working-directory: frontend
        run: npm run build
